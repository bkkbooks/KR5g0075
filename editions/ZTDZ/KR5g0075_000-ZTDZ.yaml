front:
  text: 鄧天君玄靈八門報應内旨吹二
  hash: sha256:2abafd5fbe23eb01df501bdd2c216d861057986746c348bcb4a8bd67a2206307
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0075_SJB_000-320552c, image: sjb/32/320552c.png}
body:
  text: 天君降筆親書玄靈八門内旨掌上六十甲子祕訣其旨乃九宫遁用八門直日報應之訣斷例自與徐神翁打門搥歌訣鬼敲門之法相同亦不在占燈占課得此訣者毋抱執泥次宜習誦熟記其吉凶自有神告之妙萬試萬靈先鍊斗中二使更畫二使真像晨夕寅奉雙飛七星罡吹呵媾坎離嬰兒姹女結二使浴華池金木水火土去來知生死把斷四天門不問驗不驗斗中内景默㸃長生口訣斷詩世人有病勘其因默㸃八門四理真口傳此字長生訣不須物外更求真陽日八門默㸃直日報應詩若遇休門須掘土更早悲喜定元因任你扁鵲也判死徐公口口親授真陰日八門默㸃直日報應詩若遇驚門且過詢危險三日定元因更過景日徐公保盧醫扁鵲不度真跏趺口訣日坐午夜坐子雙飛七星罡吹呵媾坎離嬰兒姹女結七七浴華池開七月八月休九月十月生十一月驚五月六月居中傷十二月死三月辰四月巳景二月卯杜正月寅右八門默㸃定直月報應例逐月所值以取吉凶例正月却以杜上行景門且過二月旬辰巳更過四月節驚門且過六月中開門定訣七月喜九十牢記休上行生門又喜子月現傷門定主過殘年師入靖念淨口呪淨心呪淨身呪淨天地呪鍊穢訖存内變誦延生經畢師端坐跏趺叩齒二十四通交氣貪巨禄文廉武破魁𩲃𩵄䰢魓𩳐魒右斗諱各交念七遍嚥液九過存己身如本命真人狀師默誦呪曰左青龍孟章速出吾左噓肝氣一口於左畔右白虎監兵速出吾右咽肺氣一口於右畔前朱雀靈光速出吾前呵心氣於前後玄武執明速出吾後吹腎氣於後想四獸護呵法身吹存兩目復出日月之光謂之日月分光次存左右鼻吸入心結成真人在絳宫却念心呪心中神丹元君號黄庭字華嬰長二寸廣三分着朱衣繫絳裙秉威德顯聖靈通造化達至真住心中莫離身凡有事速報人急急如律令心步斗入内服雲車符口授心傳方能盡矣千金莫泄記取誓狀心步斗雲車符内書名占雲車忽然雲車至存欻火功曹將吏五臟中氣結成是也次登雲車同將吏愛將某隨行四直從駕歷過黄道氣候是也聳身如登太空資罡風之氣膜也如風色慘然若不能度忽見欻火膽神是也扇開罡風黄道坦然忽見虹橋將臨橋心諸將吏出雲車同欻火四直將吏過殿上四直見二使楊炎耿必引我同入璇璣府朝拜奏事畢再同四直愛將膽神出殿看此時有何報應如拜章表未有報應亦出殿却入靖審覆候報仍前同愛將膽神及四直將吏下橋登車歷過黄道罡風至絳宫下車納將吏同車入體嚥液叩齒而起依科行事納歸所屬恍然潜形而退遁九宫八門報應圖式陽驚陰休休杜傷生開驚死景陽日順數行驚杜景死開休生傷陰日逆數行花甲子㸃到中宫即坤地門是也餘花甲子依與再輪便知日黄九宫三日管一位周而復始凡遇本日陰日休起陽日驚起前一位是開宫依九宫甲子乙丙丁遁起飛最驗切宜至祕至祕後學如得傳切莫輕泄殃及九祖禍及妻拏論長生輪斗假如甲子生人金生到巳如此爲起例子爲破軍硬是單行至本月退回何月吉凶數長生到胞胎養住再加休囚死絶斷禍福數到病者是何月住便知吉凶生死又加本時以午爲例午屬火火生到寅寅上起長生如前數生直何加本日又横數去看何日直本生午日即便知生死禍福矣口授以盡非達人大觀者不能曉也遁月轉斗起例正寅二卯三辰四巳五午六未七甲八酉九戌十亥十一子十二丑遁日直燈取報應輪一年燈圖金生到巳木生到亥水土長生居申火生到寅輪斗所屬生肖起例已寫于前數長生沐浴冠帶臨官帝旺休囚死絶胞胎養住再加休囚死絶四字斷輪至病者屬何月生日即住便知好歹吉凶千試千應萬試萬靈師不誤傳弟子只是怨道咎師神亦不應矣至叩至叩不得輕泄玄文八門斷例徐神翁傳歐陽公名打門槌又名鬼敲門欲求禍福問安危先向八門子細推但見見聞歸一位即是鬼神相報知次須察聽以何應即是中間休咎時儻聞歡笑皆云吉若是愁聲凶可知或逢鍤畚并刀斧爲報人間有哭悲若人抱得嬰兒至便把陰陽子細推男兒持陰婚娶近婦人懷妊協熊羆男人若也携男子必是喧争不久時若或婦人携蛇虺斷然姦污惹是非問訟若逢寬衣帶不問羸輸總解圍脚子偶然携杖至病人斷死不須醫或持絲麻經過眼斷然孝服見亡危却分輕重與伊說妙在當時眼底窺其家有鬼來爲祟問盡形骸見客携或見賣魚并鴈過久年遠信到階墀見有梅家陰媒動見李其家理必虧見其血家離骨肉見桃逃走定人離如逢犬吠冲來處必定人家主哭悲鼠來過處遣聲響財散人離盜賊欺更兼墨碎傷田土破器須知百事非燈燭誤來遺燼燄斷主虛驚宅不寧忽然蟢子垂絲墜却許其家喜事宜陽日震位生男子陰日小房誕女兒馬兒嘶處五猖亂猫叫須知寃債尋若或猫兒來咬脚檀神爲禍安謝宜花開花落知凶吉若見開時不須勝牛羊猪犬皆非吉呪誓雞鳴朱雀啼又聞左右鐘聲響若問産事生女臨能參造化真機妙一法通時萬法精依此推詳斷禍福名傳天下任縱横内應本命燈下略占驗其五色青寃黄時氣赤三日安紅吉白一七三朝死徐神翁鬼敲門勞吊廟縊落水石泥精樟檀古墓伏井竈客星辰呪詛地血土刀吻魈家親若依此驗法照破諸鬼神二十四字經歌判狀天生地死地死天生災生危死危死災生乾坎艮震巽離坤兌狀若無頭是祖宗於中㸃污是親朋字畫散亂鄰伴鬼卜字畫像木石精筆頭鎖出遭刑死錯亂行斜殺傷魂乾枯無力難醫救勾挑動土犯家神字有圈塗心分動行喎命蹇定難存紙破便言宿欠債補貼定是此中傾添注引入無常鬼油污投河落水人改抹前生有寃債切須家内細推尋或濃或淡主羸弱皆是㸃污伏屍停横順草飛緼破鬼妄意押字不尊神大小切疑由進退寒熱往來病愈深要知男女何方病陽隻陰雙行内尋咬牙定是家先鬼自言自語是姻親來謊語是主重病來者人歡是病輕此是徐翁真口訣能交世俗善通神學取自知如至寳千金莫泄與非人留傳末後參詳到管取虛無一寸金又名煞年逢生煞日凶亡一死一生也難當若遇吉時并凶日也須奏告保安康坤生兌死乾離危起吉坎巽安震凶艮論是何生得幾歲却從坎上起數一十艮上二十零數節節數去直何年上遁月月上遁日日上遁時直何吉凶以驗禍福論一年月分却將正月從艮上二月震三月四月巽五月六月離七月八月坤九月十月兌十一月乾十二月坎若論日子吉凶從乾上起子順行節節數去以訣吉凶八門硬例假如甲子日屬陽順從乾上起杜景死驚開休生傷假如乙丑日屬陰逆行從艮上起杜景死驚開休生傷餘倣此年月日時皆論陰陽日建立八門俱倣此例報應吉凶在於七内家人立杜還天願外人到杜遭天譴猫至寃牽天願催叫凶静吉可禳轉大來呪詛靈澤壇吠主哭聲三七見景户兒聲人財離猫叫寃愆白虎隨三七之中主哭泣屋漏之時訟解歸蛛子垂絲應落地婚姻喜事兩相宜死户猫聲病主亡犬來逐鼠病狼當響應之時燈壽滅三朝一七主離床兒童叫時悲哭動此方宜静且審詳驚户外人喧主殃猫犬高聲且見凶孕婦定然主驚恐器破之時大不同開觸猫犬大吉祥鼠静財凶後主昌風雨病遲訟即解蛛子垂絲百事昌休門屋漏主更移訟中得理病人奇二物呌時醮謝吉厨中司命亦相欺蛛子垂絲内外喜看看有夢叶熊羆生門垂蛛孕生女一米陽産兩成坤猫犬去時凶得吉家先司命保元亨傷門猫犬去時吉高座喧争大不然外客高聲猖鬼亂啾嘈鼠子主喧争自己察情兆閑坐最爲吉高枕主留連切忌持刀斧鋤鍤主窮年自己有呻吟安能保别人手彈時氣病争鬥一朝臨看經却主吉病愈在一七治事終遲滯終須寬裏急恰直起時病安在三兩日若直歡娱時病者愈爲奇若直憂立時病者見傾危若言吉則吉若言凶則凶來人氣象好禍福不相同我身無事阻即往運亨通駝腰携杖至病死不須醫簑笠來迎接孝服臨門緊張傘往來招一七可寬饒其人披麻絲孝服逐時作巾帽身體强病者即安康此時嘗酒食禄馬未曾絶若喫早春茶清凉一散佳若食諸水果癰疽日轉加時行若不害常病藥難安途中無事遇老返少年顔先遇他人請病在遲遲間正直我歸家星斗出雲霞若與人言氣病者遭迍否請時逢喜慶朝病夜即起春冬晴後雨晦滯多囏阻夏秋晴後雨不須服藥愈請時察其情巧在心中靈又一法論人岀行不是何時只以口爲定假如子時爲例子屬水水土旺到子以此爲例却將長生斗上逐節輪去若遇子上即旺也其人子丑之日必歸若遇養字亦歸餘倣此例𡄼不怕黑風翻大浪行船盡在把稍人踏破鐵鞋無覔處得來全不費工夫附祕册上腎上心下處肝西肺左中此是神明穴内有坎離宫鐄舌尖書唵字動𧦹出坎離二卦龍從火裏出虎向水中生九宫八門遁法須是熟記六十花甲子書符左天關右地軸存己身爲玄帝龜蛇上立竅足吸水火入符取鐵甲銀光入符又吸入膽府混合壯唵依出付玄靈八門之祕希有之千金莫泄行之久可以入道用之久可以通神至祕至祕重斯道也輕示非人殃及九祖受禍非輕戒慎之焉血骨奴奥肉奴汝是慈親真父母天蓬呪成形温帥本身形符符請地祇上將温元帥會同六甲旃檀宋大將督勒司命土地保祐孩童某所患夜啼即與斷絶符到速解符到奉行臣某承誥奉行鄧天君玄靈八門報應内旨
